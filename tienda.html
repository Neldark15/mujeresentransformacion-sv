<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda | Mujeres en Transformación</title>
  <meta name="description" content="Cuadernos, papelería, apparel y accesorios diseñados desde la fe para mujeres en transformación." />

  <meta property="og:title" content="Tienda MET — Mujeres en Transformación" />
  <meta property="og:description" content="Cuadernos, papelería, apparel y accesorios diseñados desde la fe." />
  <meta property="og:image" content="images/cuaderno-portada.png" />

  <link rel="icon" href="images/logo-morado.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/tienda.css" />
  <script src="js/components.js"></script>
</head>
<body>
  <met-header data-nav="shop" data-active="tienda"></met-header>

  <main id="main">
    <!-- Hero del catálogo -->
    <section class="shop-hero">
      <div class="container">
        <p class="eyebrow">La tienda MET</p>
        <h1>Todo lo que <span class="script">necesitas</span> para tu transformación</h1>
        <p class="lead">Cuadernos, papelería, apparel y accesorios diseñados desde la fe para acompañarte en cada paso.</p>
      </div>
    </section>

    <!-- Filtros y catálogo -->
    <section class="shop-section">
      <div class="container">

        <div class="shop-toolbar">
          <div class="shop-search">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="search" id="searchInput" placeholder="Buscar producto..." aria-label="Buscar producto" />
          </div>
          <div class="shop-sort">
            <label for="sortSelect" class="visually-hidden">Ordenar por</label>
            <select id="sortSelect" aria-label="Ordenar productos">
              <option value="destacados">Destacados</option>
              <option value="precio-asc">Precio: menor a mayor</option>
              <option value="precio-desc">Precio: mayor a menor</option>
              <option value="nombre">Nombre (A-Z)</option>
            </select>
          </div>
        </div>

        <div class="shop-layout">
          <aside class="shop-filters" id="shopFilters">
            <h2>Categorías</h2>
            <ul class="filter-list" id="categoryList">
              <!-- Se renderiza con JS -->
            </ul>
            <button class="btn btn-ghost btn-small" id="clearFilters" type="button">Limpiar filtros</button>
          </aside>

          <div class="shop-results">
            <div class="results-info">
              <span id="resultsCount">Cargando productos...</span>
            </div>

            <div class="product-grid" id="productGrid" aria-live="polite">
              <!-- Skeleton placeholders mientras carga -->
              <div class="product-card skeleton"></div>
              <div class="product-card skeleton"></div>
              <div class="product-card skeleton"></div>
              <div class="product-card skeleton"></div>
              <div class="product-card skeleton"></div>
              <div class="product-card skeleton"></div>
            </div>

            <div class="no-results" id="noResults" hidden>
              <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3M8 11h6"/></svg>
              <h3>No encontramos productos</h3>
              <p>Intenta con otra búsqueda o limpia los filtros.</p>
            </div>
          </div>
        </div>

      </div>
    </section>
  </main>

  
  <met-footer></met-footer>

  <met-chrome data-cart data-toast></met-chrome>

  <script type="module" src="js/cart.js"></script>
  <script type="module" src="js/tienda.js"></script>
  <script src="js/script.js" defer></script>
</body>
</html>
